services:
  - type: web
    name: namengine-business
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GODADDY_API_KEY
        sync: false
      - key: GODADDY_API_SECRET
        sync: false
      - key: GODADDY_API_BASE
        value: https://api.godaddy.com
      - key: FEEDBACK_ADMIN_TOKEN
        sync: false
      - key: FEEDBACK_ENABLED
        sync: false
      - key: GOOGLE_FEEDBACK_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_FEEDBACK_WORKSHEET
        value: Feedback
